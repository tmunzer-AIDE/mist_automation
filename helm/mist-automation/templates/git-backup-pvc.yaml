{{- if .Values.backup.git.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mist-automation.fullname" . }}-git-backup
  labels:
    {{- include "mist-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: git-backup
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backup.git.persistence.size }}
{{- end }}
