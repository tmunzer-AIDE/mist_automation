{{- if .Values.webhookCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mist-automation.fullname" . }}-webhook-collector
  labels:
    {{- include "mist-automation.webhook-collector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webhookCollector.replicaCount }}
  selector:
    matchLabels:
      {{- include "mist-automation.webhook-collector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.webhookCollector.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mist-automation.webhook-collector.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "mist-automation.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "mist-automation.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: webhook-collector
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "app.webhook_server:webhook_app", "--host", "0.0.0.0", "--port", {{ .Values.webhookCollector.port | quote }}, "--proxy-headers", "--forwarded-allow-ips=*"]
          ports:
            - name: http
              containerPort: {{ .Values.webhookCollector.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "mist-automation.fullname" . }}-config
            - secretRef:
                name: {{ include "mist-automation.secretName" . }}
          env:
            - name: MONGODB_URL
              value: {{ include "mist-automation.mongodbUrl" . }}
            {{- if and .Values.mongodb.enabled .Values.mongodb.auth.rootPassword }}
            - name: MONGODB_USERNAME
              value: "root"
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mist-automation.fullname" . }}
                  key: MONGODB_ROOT_PASSWORD
            {{- end }}
            - name: REDIS_URL
              value: "{{ include "mist-automation.redisUrl" . }}/0"
            - name: CELERY_BROKER_URL
              value: "{{ include "mist-automation.redisUrl" . }}/1"
            - name: CELERY_RESULT_BACKEND
              value: "{{ include "mist-automation.redisUrl" . }}/2"
            - name: INFLUXDB_URL
              value: {{ include "mist-automation.influxdbUrl" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.webhookCollector.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.webhookCollector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookCollector.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookCollector.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
