apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mist-automation.fullname" . }}-skills
  labels:
    {{- include "mist-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: skills
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.skills.persistence.size }}
