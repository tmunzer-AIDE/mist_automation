{{- if not .Values.security.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mist-automation.fullname" . }}
  labels:
    {{- include "mist-automation.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Security
  SECRET_KEY: {{ required "security.secretKey is required" .Values.security.secretKey | quote }}
  
  # Mist API
  {{- if .Values.mistApi.token }}
  MIST_API_TOKEN: {{ .Values.mistApi.token | quote }}
  {{- end }}
  
  # InfluxDB
  INFLUXDB_TOKEN: {{ include "mist-automation.influxdbToken" . | quote }}
  
  # Git Backup Credentials
  {{- if .Values.backup.git.repoUrl }}
  BACKUP_GIT_REPO_URL: {{ .Values.backup.git.repoUrl | quote }}
  {{- end }}
  {{- if .Values.backup.git.username }}
  BACKUP_GIT_USERNAME: {{ .Values.backup.git.username | quote }}
  {{- end }}
  {{- if .Values.backup.git.password }}
  BACKUP_GIT_PASSWORD: {{ .Values.backup.git.password | quote }}
  {{- end }}
  
  # External Integrations
  {{- if .Values.integrations.slack.webhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.integrations.slack.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.integrations.serviceNow.instanceUrl }}
  SERVICENOW_INSTANCE_URL: {{ .Values.integrations.serviceNow.instanceUrl | quote }}
  {{- end }}
  {{- if .Values.integrations.serviceNow.username }}
  SERVICENOW_USERNAME: {{ .Values.integrations.serviceNow.username | quote }}
  {{- end }}
  {{- if .Values.integrations.serviceNow.password }}
  SERVICENOW_PASSWORD: {{ .Values.integrations.serviceNow.password | quote }}
  {{- end }}
  {{- if .Values.integrations.pagerDuty.integrationKey }}
  PAGERDUTY_INTEGRATION_KEY: {{ .Values.integrations.pagerDuty.integrationKey | quote }}
  {{- end }}
{{- end }}
