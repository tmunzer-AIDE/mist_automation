{{- if and .Values.webhookCollector.enabled .Values.webhookCollector.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mist-automation.fullname" . }}-webhook
  labels:
    {{- include "mist-automation.webhook-collector.labels" . | nindent 4 }}
  {{- with .Values.webhookCollector.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.webhookCollector.ingress.className }}
  ingressClassName: {{ .Values.webhookCollector.ingress.className }}
  {{- end }}
  {{- if .Values.webhookCollector.ingress.tls }}
  tls:
    {{- range .Values.webhookCollector.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.webhookCollector.ingress.host | quote }}
      http:
        paths:
          - path: /api/v1/webhooks/mist
            pathType: Exact
            backend:
              service:
                name: {{ include "mist-automation.fullname" . }}-webhook-collector
                port:
                  number: {{ .Values.webhookCollector.service.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "mist-automation.fullname" . }}-webhook-collector
                port:
                  number: {{ .Values.webhookCollector.service.port }}
{{- end }}
