{{- if .Values.celeryWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mist-automation.fullname" . }}-celery-worker
  labels:
    {{- include "mist-automation.celery-worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.celeryWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "mist-automation.celery-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.celeryWorker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mist-automation.celery-worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "mist-automation.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "mist-automation.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: celery-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: {{ include "mist-automation.fullname" . }}-config
            - secretRef:
                name: {{ include "mist-automation.secretName" . }}
          env:
            - name: MONGODB_URL
              value: {{ include "mist-automation.mongodbUrl" . }}
            {{- if and .Values.mongodb.enabled .Values.mongodb.auth.rootPassword }}
            - name: MONGODB_USERNAME
              value: "root"
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mist-automation.fullname" . }}
                  key: MONGODB_ROOT_PASSWORD
            {{- end }}
            - name: CELERY_BROKER_URL
              value: "{{ include "mist-automation.redisUrl" . }}/1"
            - name: CELERY_RESULT_BACKEND
              value: "{{ include "mist-automation.redisUrl" . }}/2"
            - name: INFLUXDB_URL
              value: {{ include "mist-automation.influxdbUrl" . }}
          resources:
            {{- toYaml .Values.celeryWorker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: skills
              mountPath: /data/skills
            {{- if .Values.backup.git.enabled }}
            - name: git-backup
              mountPath: /backups/git
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: skills
          persistentVolumeClaim:
            claimName: {{ include "mist-automation.fullname" . }}-skills
        {{- if .Values.backup.git.enabled }}
        - name: git-backup
          persistentVolumeClaim:
            claimName: {{ include "mist-automation.fullname" . }}-git-backup
        {{- end }}
      {{- with .Values.celeryWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celeryWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celeryWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
