apiVersion: v2
name: mist-automation
description: A Helm chart for Mist Automation & Backup - Full-stack application for automating Juniper Mist network operations
type: application
version: 0.1.0
appVersion: "1.0.0"
icon: https://raw.githubusercontent.com/tmunzer-AIDE/mist-automation/main/frontend/src/favicon.svg
annotations:
  catalog.cattle.io/display-name: "Mist Automation & Backup"
  catalog.cattle.io/release-name: mist-automation
  catalog.cattle.io/os: linux
keywords:
  - mist
  - automation
  - backup
  - juniper
  - network
  - webauthn
  - passkey
maintainers:
  - name: Mist Automation Team
home: https://github.com/example/mist-automation
sources:
  - https://github.com/example/mist-automation
dependencies:
  - name: mongodb
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: influxdb
    version: "5.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: influxdb.enabled
