questions:

# ── Required ─────────────────────────────────────────────────────────────────

- variable: fqdn
  label: Application FQDN
  description: "Fully qualified domain name (e.g., mist.example.com). Used for ingress host and passkey/WebAuthn configuration."
  type: hostname
  required: true
  group: "General"

- variable: security.secretKey
  label: JWT Secret Key
  description: "Secret key for signing JWT tokens. Generate with: python -c \"import secrets; print(secrets.token_urlsafe(64))\""
  type: password
  required: true
  group: "Security"

# ── Application ──────────────────────────────────────────────────────────────

- variable: app.environment
  label: Environment
  description: "Application environment"
  type: enum
  default: "production"
  options:
    - "development"
    - "staging"
    - "production"
  group: "Application"

- variable: image.repository
  label: Image Repository
  description: "Docker image repository"
  type: string
  default: "tmunzer/mist-automation"
  group: "Application"

- variable: image.tag
  label: Image Tag
  description: "Docker image tag"
  type: string
  default: "latest"
  group: "Application"

# ── Session Management ───────────────────────────────────────────────────────

- variable: session.accessTokenExpireHours
  label: Access Token Expiry (hours)
  type: int
  default: 24
  group: "Authentication"

- variable: session.maxConcurrentSessions
  label: Max Concurrent Sessions
  type: int
  default: 5
  group: "Authentication"

# ── Password Policy ──────────────────────────────────────────────────────────

- variable: passwordPolicy.minLength
  label: Minimum Password Length
  type: int
  default: 12
  group: "Authentication"

- variable: passwordPolicy.requireSpecialChars
  label: Require Special Characters
  type: boolean
  default: true
  group: "Authentication"

# ── Ingress ──────────────────────────────────────────────────────────────────

- variable: ingress.enabled
  label: Enable Ingress
  description: "Host is derived from the FQDN field above"
  type: boolean
  default: true
  group: "Networking"
  show_subquestion_if: true
  subquestions:
    - variable: ingress.className
      label: Ingress Class
      type: string
      default: "traefik"

# ── Webhook Collector ────────────────────────────────────────────────────────

- variable: webhookCollector.enabled
  label: Enable Webhook Collector
  description: "Run a dedicated webhook ingestion server on a separate port. Allows exposing only the webhook endpoint to the internet while keeping the UI/API internal."
  type: boolean
  default: true
  group: "Webhook Collector"
  show_subquestion_if: true
  subquestions:
    - variable: webhookCollector.port
      label: Collector Port
      type: int
      default: 9000
    - variable: webhookCollector.replicaCount
      label: Collector Replicas
      type: int
      default: 1
      min: 1
      max: 10
    - variable: webhookCollector.ingress.enabled
      label: Enable Webhook Ingress
      description: "Create a separate ingress for the webhook endpoint. Requires a host to be set."
      type: boolean
      default: false
    - variable: webhookCollector.ingress.host
      label: Webhook Ingress Host
      description: "Public FQDN for the webhook endpoint (e.g., webhook.example.com). Must differ from the main app FQDN."
      type: hostname
      default: ""
      show_if: "webhookCollector.ingress.enabled=true"
    - variable: webhookCollector.ingress.className
      label: Webhook Ingress Class
      type: string
      default: "traefik"
      show_if: "webhookCollector.ingress.enabled=true"
    - variable: webhookCollector.service.type
      label: Service Type
      description: "Use NodePort or LoadBalancer to expose without an ingress controller"
      type: enum
      default: "ClusterIP"
      options:
        - "ClusterIP"
        - "NodePort"
        - "LoadBalancer"
    - variable: webhookCollector.service.nodePort
      label: Node Port
      description: "Fixed port on the node (30000-32767)"
      type: int
      default: 30900
      show_if: "webhookCollector.service.type=NodePort"

# ── Replicas ─────────────────────────────────────────────────────────────────

- variable: backend.replicaCount
  label: Backend Replicas
  type: int
  default: 1
  min: 1
  max: 10
  group: "Scaling"

- variable: celeryWorker.replicaCount
  label: Celery Worker Replicas
  type: int
  default: 1
  min: 1
  max: 10
  group: "Scaling"

# ── Database ─────────────────────────────────────────────────────────────────

- variable: mongodb.enabled
  label: Deploy Bundled MongoDB
  description: "Disable to use an external MongoDB instance"
  type: boolean
  default: true
  group: "Database"
  subquestions:
    - variable: mongodb.auth.rootPassword
      label: MongoDB Root Password
      description: "Leave empty for no authentication"
      type: password
      default: ""
      show_if: "mongodb.enabled=true"
    - variable: mongodb.external.url
      label: External MongoDB URL
      description: "e.g., mongodb://user:pass@host:27017"
      type: string
      default: ""
      show_if: "mongodb.enabled=false"

- variable: redis.enabled
  label: Deploy Bundled Redis
  description: "Disable to use an external Redis instance"
  type: boolean
  default: true
  group: "Database"
  subquestions:
    - variable: redis.auth.password
      label: Redis Password
      description: "Leave empty for no authentication"
      type: password
      default: ""
      show_if: "redis.enabled=true"
    - variable: redis.external.url
      label: External Redis URL
      description: "e.g., redis://:password@host:6379"
      type: string
      default: ""
      show_if: "redis.enabled=false"

- variable: influxdb.enabled
  label: Deploy Bundled InfluxDB
  description: "Optional — used for telemetry only. Uses official influxdb:2.7 image."
  type: boolean
  default: true
  group: "Database"

# ── Backup ───────────────────────────────────────────────────────────────────

- variable: backup.enabled
  label: Enable Backups
  type: boolean
  default: true
  group: "Backup"

- variable: backup.fullScheduleCron
  label: Backup Schedule (cron)
  type: string
  default: "0 2 * * *"
  group: "Backup"

- variable: backup.retentionDays
  label: Backup Retention (days)
  type: int
  default: 90
  group: "Backup"

- variable: backup.git.enabled
  label: Enable Git Backup
  description: "Push backups to a Git repository"
  type: boolean
  default: false
  group: "Backup"
  show_subquestion_if: true
  subquestions:
    - variable: backup.git.repoUrl
      label: Git Repository URL
      type: string
    - variable: backup.git.branch
      label: Git Branch
      type: string
      default: "main"

# ── Integrations ─────────────────────────────────────────────────────────────

- variable: integrations.slack.webhookUrl
  label: Slack Webhook URL
  description: "Optional — for workflow failure notifications"
  type: string
  default: ""
  group: "Integrations"

- variable: integrations.pagerDuty.integrationKey
  label: PagerDuty Integration Key
  description: "Optional — for workflow failure alerts"
  type: password
  default: ""
  group: "Integrations"
