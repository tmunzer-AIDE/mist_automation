<mat-sidenav-container
  class="layout-container"
  [class.desktop]="!isMobile()"
  [class.sidebar-collapsed]="sidebarCollapsed() && !isMobile()"
  [class.resizing]="resizing()"
>
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidebarOpen()"
    (closedStart)="sidebarOpen.set(false)"
    class="sidenav"
    [class.collapsed]="sidebarCollapsed() && !isMobile()"
  >
    <app-sidebar [collapsed]="sidebarCollapsed() && !isMobile()"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content>
    @if (maintenanceMode()) {
      <div class="maintenance-banner">
        System is in maintenance mode. Some features may be restricted.
      </div>
    }
    <app-topbar (toggleSidebar)="toggleSidebar()"></app-topbar>
    <div class="content-split" [class.has-panel]="showAiPanel">
      <main class="content" [class.full-width]="isFullWidth()">
        <router-outlet></router-outlet>
      </main>
      @if (showAiTab) {
        @if (showAiPanel) {
          <div
            class="resize-handle"
            (mousedown)="onResizeStart($event)"
          >
            <div class="resize-grip"></div>
          </div>
        }
        <div
          class="ai-panel-wrapper"
          [class.collapsed]="!showAiPanel"
          [style.width.px]="showAiPanel ? panelState.width() : 0"
        >
          <app-ai-panel></app-ai-panel>
        </div>
        <button
          class="ai-edge-tab"
          [style.right.px]="showAiPanel ? panelState.width() : 0"
          (click)="globalChatService.toggle()"
          [matTooltip]="showAiPanel ? 'Hide panel (Ctrl+\\)' : 'Show AI panel (Ctrl+\\)'"
          matTooltipPosition="left"
        >
          @if (showAiPanel) {
            <mat-icon class="edge-tab-icon">chevron_right</mat-icon>
          } @else {
            <app-ai-icon [size]="16" [animated]="false"></app-ai-icon>
          }
        </button>
      }
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
