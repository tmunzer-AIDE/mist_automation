<mat-toolbar>
  <button mat-icon-button (click)="toggleSidebar.emit()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>

  @if (topbarService.title$ | async; as title) {
    <span class="page-title">{{ title }}</span>
  }

  @if (topbarService.actionsTemplate$ | async; as actionsTpl) {
    <ng-container *ngTemplateOutlet="actionsTpl"></ng-container>
  }

  <span class="spacer"></span>

  @if (panelHidden()) {
    <button mat-icon-button matTooltip="Show AI panel (Ctrl+\)" (click)="globalChatService.toggle()">
      <app-ai-icon [size]="20" [animated]="false"></app-ai-icon>
    </button>
  }

  @if (user$ | async; as user) {
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <span class="avatar-letter">{{ userInitial(user.email) }}</span>
      <span class="user-email">{{ user.email }}</span>
      <mat-icon class="dropdown-icon">expand_more</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <a mat-menu-item routerLink="/profile">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </a>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  }
</mat-toolbar>
