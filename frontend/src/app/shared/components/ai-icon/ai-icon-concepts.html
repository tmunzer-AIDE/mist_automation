<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Icon Concepts — Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0078d4;
    --primary-light: #4da3e8;
    --primary-dim: rgba(0, 120, 212, 0.2);
    --accent: #059669;
    --accent-light: #34d399;
    --surface: #1c1c2e;
    --on-surface: #e0e0e8;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    gap: 100px;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 40px;
    min-height: 100vh;
    margin: 0;
    background: var(--surface);
    color: var(--on-surface);
  }
  .concept { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .concept h3 { font-size: 13px; font-weight: 500; opacity: 0.7; letter-spacing: 0.5px; }
  .row { display: flex; gap: 32px; align-items: center; }
  .size-label { font-size: 10px; opacity: 0.4; text-align: center; margin-top: 6px; }
  .light-row {
    background: #f0f2f5;
    padding: 20px 24px;
    border-radius: 12px;
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .light-label { color: #666; font-size: 10px; }
  .fab-demo {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0, 120, 212, 0.12);
    border: 1px solid rgba(0, 120, 212, 0.25);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,120,212,0.25);
    backdrop-filter: blur(8px);
  }
  .fab-demo-solid {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--surface);
    border: 1px solid rgba(0, 120, 212, 0.3);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<!-- CONCEPT 2 REFINED: MORPHING FLOW (Azure theme)                    -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="concept">
  <h3>MORPHING FLOW</h3>

  <!-- Dark background variants -->
  <div class="row">
    <!-- 48px standalone -->
    <div>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <style>
          @keyframes mf-outer {
            0%, 100% { d: path("M24 10 C32 10, 38 16, 38 24 C38 32, 32 38, 24 38 C16 38, 10 32, 10 24 C10 16, 16 10, 24 10Z"); }
            25% { d: path("M24 8 C34 12, 40 18, 36 26 C32 34, 28 40, 20 38 C12 36, 8 30, 10 22 C12 14, 18 8, 24 8Z"); }
            50% { d: path("M26 9 C30 8, 39 14, 38 22 C37 30, 34 38, 26 39 C18 40, 9 34, 10 26 C11 18, 16 10, 26 9Z"); }
            75% { d: path("M22 10 C28 7, 37 12, 40 20 C39 28, 36 36, 28 38 C20 40, 12 36, 9 28 C8 18, 14 9, 22 10Z"); }
          }
          @keyframes mf-inner {
            0%, 100% { d: path("M24 15 C29 15, 33 19, 33 24 C33 29, 29 33, 24 33 C19 33, 15 29, 15 24 C15 19, 19 15, 24 15Z"); }
            33% { d: path("M24 13 C31 15, 35 20, 33 26 C31 32, 26 35, 20 33 C14 31, 13 27, 15 21 C17 16, 20 13, 24 13Z"); }
            66% { d: path("M25 14 C28 12, 34 17, 35 23 C34 29, 30 34, 24 34 C18 34, 14 30, 14 24 C14 18, 19 14, 25 14Z"); }
          }
          @keyframes mf-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
          @keyframes mf-highlight { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
          .mf-wrap { animation: mf-spin 24s linear infinite; transform-origin: 24px 24px; }
          .mf-o { animation: mf-outer 7s ease-in-out infinite; }
          .mf-i { animation: mf-inner 5s ease-in-out infinite; }
          .mf-hi { animation: mf-highlight 3s ease-in-out infinite; }
        </style>
        <defs>
          <linearGradient id="mfg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4da3e8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#0078d4" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="mfg2" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#4da3e8"/>
            <stop offset="50%" stop-color="#0078d4"/>
            <stop offset="100%" stop-color="#005a9e"/>
          </linearGradient>
        </defs>
        <g class="mf-wrap">
          <path class="mf-o" fill="url(#mfg1)" d="M24 10 C32 10, 38 16, 38 24 C38 32, 32 38, 24 38 C16 38, 10 32, 10 24 C10 16, 16 10, 24 10Z"/>
          <path class="mf-i" fill="url(#mfg2)" d="M24 15 C29 15, 33 19, 33 24 C33 29, 29 33, 24 33 C19 33, 15 29, 15 24 C15 19, 19 15, 24 15Z"/>
        </g>
        <circle class="mf-hi" cx="23" cy="21" r="3.5" fill="white" opacity="0.4"/>
      </svg>
      <div class="size-label">48px</div>
    </div>

    <!-- 28px -->
    <div>
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
        <g class="mf-wrap">
          <path class="mf-o" fill="url(#mfg1)" d="M24 10 C32 10, 38 16, 38 24 C38 32, 32 38, 24 38 C16 38, 10 32, 10 24 C10 16, 16 10, 24 10Z"/>
          <path class="mf-i" fill="url(#mfg2)" d="M24 15 C29 15, 33 19, 33 24 C33 29, 29 33, 24 33 C19 33, 15 29, 15 24 C15 19, 19 15, 24 15Z"/>
        </g>
        <circle class="mf-hi" cx="23" cy="21" r="3.5" fill="white" opacity="0.4"/>
      </svg>

    </div>

    <!-- In FAB (glass style) -->
    <div>
      <div class="fab-demo">
        <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
          <g class="mf-wrap">
            <path class="mf-o" fill="url(#mfg1)" d="M24 10 C32 10, 38 16, 38 24 C38 32, 32 38, 24 38 C16 38, 10 32, 10 24 C10 16, 16 10, 24 10Z"/>
            <path class="mf-i" fill="url(#mfg2)" d="M24 15 C29 15, 33 19, 33 24 C33 29, 29 33, 24 33 C19 33, 15 29, 15 24 C15 19, 19 15, 24 15Z"/>
          </g>
          <circle class="mf-hi" cx="23" cy="21" r="3.5" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <div class="size-label">FAB glass</div>
    </div>

    <!-- In FAB (surface style) -->
    <div>

<!-- CONCEPT 3 REFINED: NETWORK PULSE (Azure + Teal accents)           -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="concept">

  <div class="row">
    <!-- 48px -->
    <div>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <style>
          @keyframes np-travel-1 { 0%, 100% { stroke-dashoffset: 30; } 40%, 60% { stroke-dashoffset: 0; } }
          @keyframes np-travel-2 { 0%, 100% { stroke-dashoffset: 30; } 50%, 70% { stroke-dashoffset: 0; } }
          @keyframes np-travel-3 { 0%, 100% { stroke-dashoffset: 30; } 60%, 80% { stroke-dashoffset: 0; } }
          @keyframes np-node { 0%, 100% { r: 2.8; } 50% { r: 3.5; } }
          @keyframes np-hub { 0%, 100% { r: 4.5; opacity: 0.85; } 50% { r: 5.5; opacity: 1; } }
          @keyframes np-ring { 0%, 100% { r: 7; opacity: 0.08; } 50% { r: 9; opacity: 0.15; } }
          .np-link { stroke: #0078d4; stroke-width: 1; opacity: 0.25; }
          .np-pulse { stroke-dasharray: 3 27; fill: none; stroke-width: 1.5; opacity: 0.9; }
          .np-p1 { stroke: #34d399; animation: np-travel-1 2.8s ease-in-out infinite; }
          .np-p2 { stroke: #34d399; animation: np-travel-2 3.2s ease-in-out infinite 0.6s; }
          .np-p3 { stroke: #059669; animation: np-travel-3 3.6s ease-in-out infinite 1.2s; }
          .np-dot { fill: #0078d4; }
          .np-d1 { animation: np-node 2.8s ease-in-out infinite; }
          .np-d2 { animation: np-node 2.8s ease-in-out infinite 0.5s; }
          .np-d3 { animation: np-node 2.8s ease-in-out infinite 1.0s; }
          .np-d4 { animation: np-node 2.8s ease-in-out infinite 1.5s; }
          .np-d5 { animation: np-node 2.8s ease-in-out infinite 2.0s; }
          .np-center { fill: #0078d4; animation: np-hub 3s ease-in-out infinite; }
          .np-glow { fill: #0078d4; animation: np-ring 3s ease-in-out infinite; }
        </style>
        <!-- Glow ring -->
        <circle class="np-glow" cx="24" cy="24" r="7"/>
        <!-- Links -->
        <line class="np-link" x1="24" y1="24" x2="11" y2="11"/>
        <line class="np-link" x1="24" y1="24" x2="37" y2="11"/>
        <line class="np-link" x1="24" y1="24" x2="9" y2="31"/>
        <line class="np-link" x1="24" y1="24" x2="39" y2="31"/>
        <line class="np-link" x1="24" y1="24" x2="24" y2="41"/>
        <!-- Pulse lines -->
        <line class="np-pulse np-p1" x1="24" y1="24" x2="11" y2="11"/>
        <line class="np-pulse np-p2" x1="24" y1="24" x2="37" y2="11"/>
        <line class="np-pulse np-p3" x1="24" y1="24" x2="39" y2="31"/>
        <!-- Nodes -->
        <circle class="np-dot np-d1" cx="11" cy="11" r="2.8"/>
        <circle class="np-dot np-d2" cx="37" cy="11" r="2.8"/>
        <circle class="np-dot np-d3" cx="9" cy="31" r="2.8"/>
        <circle class="np-dot np-d4" cx="39" cy="31" r="2.8"/>
        <circle class="np-dot np-d5" cx="24" cy="41" r="2.8"/>
        <!-- Hub -->
        <circle class="np-center" cx="24" cy="24" r="4.5"/>
        <circle cx="23.5" cy="22.5" r="1.8" fill="white" opacity="0.45"/>
      </svg>
      <div class="size-label">48px</div>
    </div>

    <!-- 28px -->
    <div>
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
        <circle class="np-glow" cx="24" cy="24" r="7" fill="#0078d4"/>
