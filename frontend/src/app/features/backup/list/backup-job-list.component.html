<div class="page-actions">
  <button mat-stroked-button (click)="navigateToBackups()">
    <mat-icon>arrow_back</mat-icon> Back to Backups
  </button>
  <button mat-flat-button class="btn-accent" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon> New Backup
  </button>
</div>

<!-- Chart -->
@if (chartConfig()) {
  <app-backup-chart-card title="Job activity & duration (30 days)">
    <div class="chart-container">
      <canvas
        baseChart
        [datasets]="chartConfig()!.data.datasets"
        [labels]="chartConfig()!.data.labels!"
        [options]="chartConfig()!.options!"
        type="bar"
      ></canvas>
    </div>
  </app-backup-chart-card>
}

@if (loadingJobs()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

@if (!loadingJobs() && jobs().length === 0) {
  <app-empty-state
    icon="work_history"
    title="No jobs yet"
    message="Run a backup to see job history here."
  >
    <button mat-flat-button class="btn-accent" (click)="openCreateDialog()">Create Backup</button>
  </app-empty-state>
}

@if (jobs().length > 0) {
  <div class="table-card">
    <table mat-table [dataSource]="jobs()">
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let job">
          <app-status-badge [status]="job.status"></app-status-badge>
        </td>
      </ng-container>
      <ng-container matColumnDef="backup_type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let job" class="type-cell">{{ job.backup_type }}</td>
      </ng-container>
      <ng-container matColumnDef="object_count">
        <th mat-header-cell *matHeaderCellDef>Objects</th>
        <td mat-cell *matCellDef="let job">{{ job.object_count }}</td>
      </ng-container>
      <ng-container matColumnDef="size">
        <th mat-header-cell *matHeaderCellDef>Size</th>
        <td mat-cell *matCellDef="let job">{{ job.size || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let job">{{ job.created_at | dateTime:'short' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="jobColumns"></tr>
      <tr
        mat-row
        *matRowDef="let job; columns: jobColumns"
        class="clickable-row"
        (click)="viewJobDetail(job)"
      ></tr>
    </table>
  </div>

  <mat-paginator
    [length]="jobsTotal()"
    [pageSize]="jobsPageSize"
    [pageIndex]="jobsPageIndex"
    [pageSizeOptions]="[25, 50, 100]"
    (page)="onJobsPage($event)"
    showFirstLastButtons
  ></mat-paginator>
}
