<app-page-header subtitle="System activity log"></app-page-header>

<div class="filters" [formGroup]="filterForm">
  <mat-form-field appearance="outline">
    <mat-label>Event Type</mat-label>
    <mat-select formControlName="event_type">
      <mat-option value="">All</mat-option>
      @for (type of eventTypes; track type) {
        <mat-option [value]="type">{{ type }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>User ID</mat-label>
    <input matInput formControlName="user_id" placeholder="Filter by user ID" />
  </mat-form-field>

  <button mat-stroked-button (click)="applyFilters()">
    <mat-icon>filter_list</mat-icon> Filter
  </button>
  <button mat-button (click)="clearFilters()">Clear</button>
</div>

@if (loading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<div class="table-card">
  <table mat-table [dataSource]="logs()">
    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Time</th>
      <td mat-cell *matCellDef="let log">{{ log.timestamp | dateTime }}</td>
    </ng-container>

    <ng-container matColumnDef="event_type">
      <th mat-header-cell *matHeaderCellDef>Event</th>
      <td mat-cell *matCellDef="let log">{{ log.event_type }}</td>
    </ng-container>

    <ng-container matColumnDef="user_email">
      <th mat-header-cell *matHeaderCellDef>User</th>
      <td mat-cell *matCellDef="let log">{{ log.user_email || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="source_ip">
      <th mat-header-cell *matHeaderCellDef>Source IP</th>
      <td mat-cell *matCellDef="let log">{{ log.source_ip || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Details</th>
      <td mat-cell *matCellDef="let log" class="details-cell">
        {{ log.details | json }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<mat-paginator
  [length]="total()"
  [pageSize]="pageSize"
  [pageIndex]="pageIndex"
  [pageSizeOptions]="[25, 50, 100]"
  (page)="onPage($event)"
  showFirstLastButtons
>
</mat-paginator>
