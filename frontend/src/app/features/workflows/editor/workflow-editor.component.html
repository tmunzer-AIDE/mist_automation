<!-- Topbar actions template (projected into app topbar via TopbarService) -->
<ng-template #topbarActions>
  <button mat-icon-button (click)="cancel()" matTooltip="Back to workflows">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <input class="topbar-workflow-name" [ngModel]="workflowName()" (ngModelChange)="workflowName.set($event)" placeholder="Workflow name" />
  <span class="spacer"></span>
  @if (workflowId()) {
    <span class="status-chip" [ngClass]="statusChipClass()">{{ workflowStatus() }}</span>
  }
  <button mat-icon-button [matMenuTriggerFor]="editorMenu" matTooltip="More actions">
    <mat-icon>more_vert</mat-icon>
  </button>
  <mat-menu #editorMenu>
    <button mat-menu-item (click)="openDescription()">
      <mat-icon>description</mat-icon> Edit Description
    </button>
    @if (workflowId()) {
      <button mat-menu-item (click)="toggleStatus()">
        <mat-icon>{{ workflowStatus() === 'enabled' ? 'pause' : 'play_arrow' }}</mat-icon>
        {{ workflowStatus() === 'enabled' ? 'Disable' : 'Enable' }}
      </button>
      <button mat-menu-item (click)="runWorkflow()"><mat-icon>play_arrow</mat-icon> Run Now</button>
      <button mat-menu-item (click)="openExecutions()">
        <mat-icon>history</mat-icon> View Executions
      </button>
    }
  </mat-menu>
  <button mat-flat-button (click)="save()" [disabled]="saving()">
    {{ saving() ? 'Saving...' : 'Save' }}
  </button>
</ng-template>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
} @else {
  <!-- Editor shell: sidebar + canvas + config -->
  <div class="editor-shell">
    <!-- Left: Block palette sidebar -->
    <div class="palette-sidebar">
      <app-block-palette-sidebar (blockSelected)="onPaletteBlockSelected($event)" />
    </div>

    <!-- Center: Graph canvas + simulation panel -->
    <div class="canvas-area">
      <app-graph-canvas
        [nodes]="graph().nodes"
        [edges]="graph().edges"
        [selectedNodeId]="selectedNodeId()"
        [selectedEdgeId]="selectedEdgeId()"
        [simulationState]="simulationState()"
        (nodeSelected)="onNodeSelected($event)"
        (nodeDeselected)="onNodeDeselected()"
        (nodeMoved)="onNodeMoved($event)"
        (nodeRemoved)="onNodeRemoved($event)"
        (edgeCreated)="onEdgeCreated($event)"
        (edgeSelected)="onEdgeSelected($event)"
        (edgeRemoved)="onEdgeRemoved($event)"
        (canvasDropped)="onCanvasDropped($event)"
        (viewportChanged)="onViewportChanged($event)"
      />

      <!-- Bottom: Simulation panel -->
      <app-simulation-panel
        [workflowId]="workflowId()"
        [simulationState]="simulationState()"
        (simulationStarted)="onSimulationStarted($event)"
        (simulationStepChanged)="onSimulationStepChanged($event)"
      />
    </div>

    <!-- Right: Resizable config panel (when a node is selected) -->
    @if (selectedNode()) {
      <div class="config-panel-container" [style.width.px]="configPanelWidth()">
        <div class="resize-handle" (mousedown)="onResizeStart($event)"></div>
        <div class="config-panel-header-actions">
          <button mat-icon-button matTooltip="Close" (click)="onNodeDeselected()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        <app-node-config-panel
          [node]="selectedNode()!"
          [workflowId]="workflowId()"
          [variableTree]="variableTree()"
          (configChanged)="onNodeConfigChanged($event)"
        />
      </div>
    }
  </div>
}
