<!-- Topbar actions template (projected into app topbar via TopbarService) -->
<ng-template #topbarActions>
  <button mat-icon-button (click)="cancel()" matTooltip="Back to workflows">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <input class="topbar-workflow-name" [value]="workflowName()" (input)="workflowName.set($any($event.target).value)" placeholder="Workflow name" />
  <span class="spacer"></span>
  @if (workflowType() === 'subflow') {
    <span class="status-chip status-subflow">Sub-Flow</span>
  }
  @if (workflowId()) {
    <span class="status-chip" [ngClass]="statusChipClass()">{{ workflowStatus() }}</span>
    <button mat-icon-button (click)="toggleStatus()" [matTooltip]="workflowStatus() === 'enabled' ? 'Disable' : 'Enable'">
      <mat-icon>{{ workflowStatus() === 'enabled' ? 'toggle_on' : 'toggle_off' }}</mat-icon>
    </button>
    <button mat-icon-button (click)="runWorkflow()" matTooltip="Run Now">
      <mat-icon>play_arrow</mat-icon>
    </button>
    <button mat-icon-button (click)="openExecutions()" matTooltip="View Executions">
      <mat-icon>history</mat-icon>
    </button>
  }
  <button mat-icon-button [matMenuTriggerFor]="editorMenu" matTooltip="More">
    <mat-icon>more_vert</mat-icon>
  </button>
  <mat-menu #editorMenu>
    <button mat-menu-item (click)="openDescription()">
      <mat-icon>description</mat-icon> Edit Description
    </button>
    <button mat-menu-item (click)="exportWorkflow()">
      <mat-icon>download</mat-icon> Export as JSON
    </button>
  </mat-menu>
  <button mat-flat-button (click)="save()" [disabled]="saving()">
    {{ saving() ? 'Saving...' : 'Save' }}
  </button>
</ng-template>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
} @else {
  <!-- Editor shell: sidebar + canvas + config -->
  <div class="editor-shell">
    <!-- Left: Block palette sidebar -->
    <div class="palette-sidebar">
      <app-block-palette-sidebar [workflowType]="workflowType()" (blockSelected)="onPaletteBlockSelected($event)" />
    </div>

    <!-- Center: Graph canvas + simulation panel -->
    <div class="canvas-area">
      <app-graph-canvas
        [nodes]="graph().nodes"
        [edges]="graph().edges"
        [selectedNodeId]="selectedNodeId()"
        [selectedEdgeId]="selectedEdgeId()"
        [simulationState]="simulationState()"
        (nodeSelected)="onNodeSelected($event)"
        (nodeDeselected)="onNodeDeselected()"
        (nodeMoved)="onNodeMoved($event)"
        (nodeRemoved)="onNodeRemoved($event)"
        (edgeCreated)="onEdgeCreated($event)"
        (edgeSelected)="onEdgeSelected($event)"
        (edgeRemoved)="onEdgeRemoved($event)"
        (canvasDropped)="onCanvasDropped($event)"
        (viewportChanged)="onViewportChanged($event)"
      />

      <!-- Bottom: Simulation panel -->
      <app-simulation-panel
        [workflowId]="workflowId()"
        [workflowType]="workflowType()"
        [inputParameters]="inputParameters()"
        [simulationState]="simulationState()"
        (simulationStarted)="onSimulationStarted($event)"
        (simulationStepChanged)="onSimulationStepChanged($event)"
        (simulationProgress)="onSimulationProgress($event)"
      />
    </div>

    <!-- Right: Resizable config panel (when a node is selected) -->
    @if (selectedNode()) {
      <div class="config-panel-container" [style.width.px]="configPanelWidth()">
        <div class="resize-handle" (mousedown)="onResizeStart($event)"></div>
        <div class="config-panel-header-actions">
          @if (selectedNode()?.type !== 'trigger' && selectedNode()?.type !== 'subflow_input') {
            <button mat-icon-button matTooltip="Delete node" (click)="onNodeRemoved(selectedNode()!.id)">
              <mat-icon>delete</mat-icon>
            </button>
          }
          <button mat-icon-button matTooltip="Close" (click)="onNodeDeselected()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        <app-node-config-panel
          [node]="selectedNode()!"
          [workflowId]="workflowId()"
          [workflowType]="workflowType()"
          [inputParameters]="inputParameters()"
          [outputParameters]="outputParameters()"
          [variableTree]="variableTree()"
          (configChanged)="onNodeConfigChanged($event)"
          (inputParametersChanged)="onInputParametersChanged($event)"
          (outputParametersChanged)="onOutputParametersChanged($event)"
        />
      </div>
    }
  </div>
}
