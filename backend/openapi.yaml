  # ═══════════════════════════════════════════════════════════════════════════
  # Execution Endpoints
  # ═══════════════════════════════════════════════════════════════════════════
  /executions:
    get:
      tags:
        - Executions
      summary: List all executions
      description: List all workflow executions across all workflows accessible to the current user
      operationId: listAllExecutions
      parameters:
        - name: skip
          in: query
