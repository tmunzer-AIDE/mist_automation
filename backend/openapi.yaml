  # ═══════════════════════════════════════════════════════════════════════════
  # WebSocket Endpoints
  # ═══════════════════════════════════════════════════════════════════════════
  /ws:
    get:
      tags:
        - WebSocket
      summary: WebSocket connection
      description: |
        Authenticated WebSocket endpoint with channel-based pub/sub.
        
        Protocol:
        1. Connect to ws://host/api/v1/ws
        2. Send auth message: { "type": "auth", "token": "<jwt>" } within 10 seconds
        3. Server responds { "type": "auth_ok" } on success or { "type": "auth_error" } on failure
        4. After auth, send subscribe/unsubscribe messages for channels:
           - { "type": "subscribe", "channel": "simulation:<stream_id>" }
           - { "type": "unsubscribe", "channel": "simulation:<stream_id>" }
        5. Server sends { "type": "ping" } periodically, respond with { "type": "pong" }
        
        Available channels:
        - simulation:<stream_id> - Real-time simulation progress updates
        - webhooks:monitor - Live webhook event stream
        - report:<report_id> - Real-time report generation progress
      operationId: websocketConnect
      security: []
      responses:
        '101':
          description: Switching Protocols to WebSocket
        '400':
          description: WebSocket upgrade required

# ═══════════════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    # ─────────────────────────────────────────────────────────────────────────
    # Common Schemas
    # ─────────────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Error message

    StatusMessageResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
        message:
          type: string

    # ─────────────────────────────────────────────────────────────────────────
    # Health
    # ─────────────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required:
        - status
        - app
        - version
        - environment
        - is_initialized
        - password_policy
      properties:
        status:
          type: string
          examples:
            - healthy
        app:
          type: string
          examples:
            - Mist Automation & Backup
        version:
          type: string
          examples:
            - 1.0.0
        environment:
          type: string
          examples:
            - development
        is_initialized:
          type: boolean
          description: Whether the system has been initialized (has at least one user)
        maintenance_mode:
          type: boolean
          description: Whether system is in maintenance mode
        password_policy:
          type: object
          properties:
            min_length:
              type: integer
              description: Minimum password length
            require_uppercase:
              type: boolean
            require_lowercase:
              type: boolean
            require_digits:
              type: boolean
            require_special_chars:
              type: boolean

    # ─────────────────────────────────────────────────────────────────────────
    # Authentication
    # ─────────────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          minLength: 1
          description: User password
        remember_me:
          type: boolean
          default: false
          description: Keep user logged in for longer (extends token expiry)

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          default: bearer
          description: Token type
        expires_in:
          type: integer
          description: Token expiration time in seconds

    OnboardRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Admin email address
        password:
          type: string
          format: password
          minLength: 1
          description: Admin password (must meet password policy)

    UpdateProfileRequest:
      type: object
      properties:
        timezone:
          type:
            - string
            - 'null'
          description: User timezone (IANA format, e.g., 'America/New_York')

    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: Current password
        new_password:
          type: string
          format: password
          minLength: 1
          description: New password (must meet password policy)

    SessionResponse:
      type: object
      required:
        - id
        - user_id
        - device_info
        - trusted_device
        - created_at
        - last_activity
        - expires_at
        - is_current
      properties:
        id:
          type: string
          description: Session ID
        user_id:
          type: string
          description: User ID
        device_info:
          type: object
          additionalProperties: true
          description: Device information (browser, OS, etc.)
        trusted_device:
          type: boolean
          description: Whether this is a trusted/remembered device
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        last_activity:
          type: string
          format: date-time
          description: Last activity timestamp
        expires_at:
          type: string
          format: date-time
          description: Session expiration timestamp
        is_current:
          type: boolean
          description: Whether this is the current session

    SessionListResponse:
      type: object
      required:
        - sessions
        - total
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        total:
          type: integer

    # ─────────────────────────────────────────────────────────────────────────
    # User
    # ─────────────────────────────────────────────────────────────────────────
    UserCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          minLength: 1
          description: User password
        roles:
          type: array
          items:
            type: string
            enum: [admin, automation, backup]
          default: []
          description: "User roles. Allowed values: admin, automation, backup"
        timezone:
          type: string
          default: UTC
          description: User timezone

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
        roles:
          type: array
          items:
            type: string
            enum: [admin, automation, backup]
          description: "User roles. Allowed values: admin, automation, backup"
        timezone:
          type: string
          description: User timezone
        is_active:
          type: boolean
          description: Whether user is active

    UserResponse:
      type: object
      required:
        - id
        - email
        - roles
        - timezone
        - is_active
        - totp_enabled
        - created_at
      properties:
        id:
          type: string
          description: User ID
        email:
          type: string
          format: email
          description: User email
        roles:
          type: array
          items:
            type: string
          description: User roles
        timezone:
          type: string
          description: User timezone
        is_active:
          type: boolean
          description: Whether user is active
        totp_enabled:
          type: boolean
          description: Whether 2FA is enabled
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        last_login:
          type:
            - string
            - 'null'
          format: date-time
          description: Last login timestamp

    UserListResponse:
      type: object
      required:
        - users
        - total
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
          description: List of users
        total:
          type: integer
          description: Total number of users

    # ─────────────────────────────────────────────────────────────────────────
    # Workflow
    # ─────────────────────────────────────────────────────────────────────────
    ApiCatalogEntry:
      type: object
      properties:
        method:
          type: string
          description: HTTP method
        path:
          type: string
          description: API path template
        description:
          type: string
          description: Endpoint description
        category:
          type: string
          description: Category for grouping

    WorkflowCreate:
      type: object
      required:
        - name
        - nodes
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Workflow name
        description:
          type:
            - string
            - 'null'
          description: Workflow description
        workflow_type:
          type: string
          enum: [standard, subflow]
          default: standard
          description: "Workflow type: standard (trigger-based) or subflow (callable from other workflows)"
        timeout_seconds:
          type: integer
          minimum: 10
          maximum: 3600
          default: 300
          description: Workflow execution timeout
        nodes:
          type: array
          items:
            type: object
            additionalProperties: true
          minItems: 1
          description: Graph nodes (trigger/subflow_input + action nodes)
        edges:
          type: array
          items:
            type: object
            additionalProperties: true
          default: []
          description: Graph edges connecting nodes
        viewport:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Canvas viewport state (zoom, pan position)
        input_parameters:
          type: array
          items:
            $ref: '#/components/schemas/SubflowParameter'
          default: []
          description: Input parameters for sub-flow workflows
        output_parameters:
          type: array
          items:
            $ref: '#/components/schemas/SubflowParameter'
          default: []
          description: Output parameters for sub-flow workflows

    WorkflowUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Workflow name
        description:
          type:
            - string
            - 'null'
