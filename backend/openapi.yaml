          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: status_filter
          in: query
          description: Filter by execution status
          schema:
            type: string
            enum: [pending, running, succeeded, failed, cancelled]
        - name: trigger_type
          in: query
          description: Filter by trigger type
          schema:
            type: string
      responses:
        '200':
          description: List of executions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /executions/{execution_id}/cancel:
    post:
      tags:
        - Executions
      summary: Cancel execution
      description: Cancel a pending or running execution
      operationId: cancelExecution
      parameters:
        - name: execution_id
          in: path
          required: true
          description: Execution ID
          schema:
            type: string
      responses:
        '200':
          description: Execution cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessageResponse'
        '400':
          description: Invalid execution ID format or cannot cancel execution with current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # Webhook Endpoints
  # ═══════════════════════════════════════════════════════════════════════════
  /webhooks/mist:
    post:
      tags:
        - Webhooks
      summary: Receive Mist webhook
      description: |
        Unified Mist webhook gateway. Receives all Mist webhooks, stores them as WebhookEvents,
        and routes internally to both the automation and backup modules.
        Called by Mist Cloud or Smee.io forwarder.
      operationId: receiveMistWebhook
      security: []
      parameters:
        - name: X-Mist-Signature
          in: header
          description: Mist webhook HMAC-SHA256 signature for verification
          schema:
            type: string
        - name: X-Forwarded-By
          in: header
          description: Set by internal Smee forwarder (value 'smee' bypasses signature check from localhost)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Mist webhook payload
      responses:
        '200':
          description: Webhook received and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookReceivedResponse'
        '401':
          description: Missing or invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/events:
    get:
      tags:
        - Webhooks
      summary: List webhook events
      description: List webhook events received from Mist
      operationId: listWebhookEvents
      parameters:
        - name: skip
          in: query
          description: Number of events to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: webhook_type
          in: query
          description: Filter by webhook type
          schema:
            type: string
        - name: processed
          in: query
          description: Filter by processed status
          schema:
            type: boolean
      responses:
        '200':
          description: List of webhook events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/events/{event_id}:
    get:
      tags:
        - Webhooks
      summary: Get webhook event
      description: Get webhook event details by ID including full payload and headers
      operationId: getWebhookEvent
      parameters:
        - name: event_id
          in: path
          required: true
          description: Webhook event ID
          schema:
            type: string
      responses:
        '200':
          description: Webhook event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventDetailResponse'
        '400':
          description: Invalid event ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/events/{event_id}/replay:
    post:
      tags:
        - Webhooks
      summary: Replay webhook event
      description: Replay a webhook event through the workflow engine
      operationId: replayWebhookEvent
      parameters:
        - name: event_id
          in: path
          required: true
          description: Webhook event ID
          schema:
            type: string
      responses:
        '200':
          description: Replay queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessageResponse'
        '400':
          description: Invalid event ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/stats:
    get:
      tags:
        - Webhooks
      summary: Get webhook statistics
      description: Get aggregated webhook volume statistics bucketed by time
      operationId: getWebhookStats
      parameters:
        - name: hours
          in: query
          description: Time range in hours (max 30 days)
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        '200':
          description: Webhook statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookStatsResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/smee/status:
    get:
      tags:
        - Webhooks
      summary: Get Smee status
      description: Get Smee.io webhook forwarder client status (admin only)
      operationId: getSmeeStatus
      responses:
        '200':
          description: Smee status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmeeStatusResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/smee/start:
    post:
      tags:
        - Webhooks
      summary: Start Smee client
      description: |
        Start the Smee.io webhook forwarder (admin only).
        Accepts an optional smee_channel_url in the request body.
        The provided URL is persisted automatically.
      operationId: startSmeeClient
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmeeStartRequest'
      responses:
        '200':
          description: Smee started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmeeStatusResponse'
        '400':
          description: Smee.io channel URL not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/smee/stop:
    post:
      tags:
        - Webhooks
      summary: Stop Smee client
      description: Stop the Smee.io webhook forwarder (admin only)
      operationId: stopSmeeClient
      responses:
        '200':
          description: Smee stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessageResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # Backup Endpoints
  # ═══════════════════════════════════════════════════════════════════════════
  /backups:
    get:
      tags:
        - Backups
      summary: List backups
      description: List all configuration backup jobs
      operationId: listBackups
      parameters:
        - name: skip
          in: query
          description: Number of backups to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Number of backups to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: backup_type
          in: query
          description: Filter by backup type
          schema:
            type: string
            enum: [manual, full]
        - name: org_id
          in: query
          description: Filter by organization ID
          schema:
            type: string
      responses:
        '200':
          description: List of backups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Backups
      summary: Create backup
      description: |
        Trigger a configuration backup.
        - For 'full' backups: backs up the entire org (org_id from system config).
        - For 'manual' backups: backs up selected objects specified by object_type and object_ids.
      operationId: createBackup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupCreateRequest'
      responses:
        '201':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobResponse'
        '400':
          description: Invalid request parameters or Mist not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/stats/objects:
    get:
      tags:
        - Backups
      summary: Get object backup stats
      description: Daily count of distinct objects backed up over the last 30 days
      operationId: getObjectStats
      responses:
        '200':
          description: Object backup statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupObjectStatsResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/stats/jobs:
    get:
      tags:
        - Backups
      summary: Get backup job stats
      description: Daily job statistics over the last 30 days including success/failure rates and durations
      operationId: getJobStats
      responses:
        '200':
          description: Backup job statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupJobStatsResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/compare:
    get:
      tags:
        - Backups
      summary: Compare backups
      description: Compare two backups to see configuration differences
      operationId: compareBackups
      parameters:
        - name: backup_id_1
          in: query
          required: true
          description: First backup ID
          schema:
            type: string
        - name: backup_id_2
          in: query
          required: true
          description: Second backup ID
          schema:
            type: string
      responses:
        '200':
          description: Backup comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupDiffResponse'
        '400':
          description: Invalid backup ID or incomplete backup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/timeline:
    get:
      tags:
        - Backups
      summary: Get backup timeline
      description: Get timeline view of configuration changes over time
      operationId: getBackupTimeline
      parameters:
        - name: org_id
          in: query
          required: true
          description: Organization ID
          schema:
            type: string
        - name: site_id
          in: query
          description: Site ID (optional)
          schema:
            type: string
        - name: start_date
          in: query
          description: Start date (ISO format)
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          description: End date (ISO format)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Backup timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupTimelineResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/objects:
    get:
      tags:
        - Backups
      summary: List backup objects
      description: List backed-up objects with latest version summary. Groups by object_id and returns one row per unique object.
      operationId: listBackupObjects
      parameters:
        - name: skip
          in: query
          description: Number of objects to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Number of objects to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: search
          in: query
          description: Search object name, type, or ID
          schema:
            type: string
        - name: object_type
          in: query
          description: Filter by object type
          schema:
            type: string
        - name: site_id
          in: query
          description: Filter by site ID
          schema:
            type: string
        - name: scope
          in: query
          description: Filter by scope
          schema:
            type: string
            enum: [org, site]
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [active, deleted]
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
            enum: [object_name, object_type, version_count, last_backed_up_at, first_backed_up_at, latest_version]
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: List of backup objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupObjectListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/changes:
    get:
      tags:
        - Backups
      summary: List backup changes
      description: List individual backup change events for the timeline view. Each row is a single version of a backed-up object.
      operationId: listBackupChanges
      parameters:
        - name: skip
          in: query
          description: Number of changes to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Number of changes to return
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: object_type
          in: query
          description: Filter by object type
          schema:
            type: string
        - name: event_type
          in: query
          description: Filter by event type
          schema:
            type: string
        - name: site_id
          in: query
          description: Filter by site ID
          schema:
            type: string
        - name: scope
          in: query
          description: Filter by scope
          schema:
            type: string
            enum: [org, site]
        - name: start_date
          in: query
          description: Start date (ISO format)
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          description: End date (ISO format)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of backup changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupChangeListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/objects/{object_id}/dependencies:
    get:
      tags:
        - Backups
      summary: Get object dependencies
      description: |
        Get parent and child dependencies for a backed-up object.
        Parents: objects this object references (from its references field).
        Children: objects that reference this object.
        Implicit site parent is included when the object has a site_id.
      operationId: getObjectDependencies
      parameters:
        - name: object_id
          in: path
          required: true
          description: Object ID
          schema:
            type: string
      responses:
        '200':
          description: Object dependencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectDependencyResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active backup found for this object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/objects/{object_id}/versions:
    get:
      tags:
        - Backups
      summary: Get object versions
      description: Get all versions of a backed-up object
      operationId: getObjectVersions
      parameters:
        - name: object_id
          in: path
          required: true
          description: Object ID
          schema:
            type: string
      responses:
        '200':
          description: List of object versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupObjectVersionListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Object not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/objects/versions/{version_id}/restore:
    post:
      tags:
        - Backups
      summary: Restore object version
      description: Restore a backed-up object to a specific version in Mist
      operationId: restoreObjectVersion
      parameters:
        - name: version_id
          in: path
          required: true
          description: Version document ID
          schema:
            type: string
        - name: dry_run
          in: query
          description: Preview restore without applying
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Restore result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreResultResponse'
        '400':
          description: Invalid version ID format or Mist not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
