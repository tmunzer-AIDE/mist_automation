        status:
          type: string
          enum: [draft, enabled, disabled]
          description: Workflow status
        timeout_seconds:
          type: integer
          minimum: 10
          maximum: 3600
          description: Workflow execution timeout
        nodes:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Graph nodes
        edges:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Graph edges connecting nodes
        viewport:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Canvas viewport state
        input_parameters:
          type: array
          items:
            $ref: '#/components/schemas/SubflowParameter'
          description: Input parameters for sub-flow workflows
        output_parameters:
          type: array
          items:
            $ref: '#/components/schemas/SubflowParameter'
          description: Output parameters for sub-flow workflows

    WorkflowResponse:
      type: object
      required:
        - id
        - name
        - workflow_type
        - created_by
        - status
        - sharing
        - timeout_seconds
        - nodes
        - edges
