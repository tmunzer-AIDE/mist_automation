openapi: 3.1.0
info:
  title: Mist Automation Platform
  description: Comprehensive web application for automating Juniper Mist operations
    and managing configuration backups
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health Check
      description: Health check endpoint.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /:
    get:
      tags:
      - Root
      summary: Root
      description: Root endpoint.
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Login
      description: Login endpoint - authenticate user and return JWT token.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Logout
      description: Logout endpoint - invalidate JWT token.
      operationId: logout_api_v1_auth_logout_post
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBearer: []
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Refresh Token
      description: 'Refresh JWT token.

        Invalidates the old session and creates a new one.'
      operationId: refresh_token_api_v1_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Get Current User
      description: Get current authenticated user information.
      operationId: get_current_user_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__auth__UserResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/profile:
    put:
      tags:
      - Authentication
      - Authentication
      summary: Update Profile
      description: Update current user's profile settings (e.g. timezone).
      operationId: update_profile_api_v1_auth_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__auth__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/auth/onboard:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Onboard
      description: 'Onboarding endpoint - create the first admin user.

        Only works when no users exist in the system.'
      operationId: onboard_api_v1_auth_onboard_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/change-password:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Change Password
      description: Change password for the current user.
      operationId: change_password_api_v1_auth_change_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/auth/sessions:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Get Sessions
      description: Get active sessions for the current user.
      operationId: get_sessions_api_v1_auth_sessions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__auth__SessionListResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/sessions/{session_id}:
    delete:
      tags:
      - Authentication
      - Authentication
      summary: Revoke Session
      description: Revoke a specific session. Cannot revoke the current session.
      operationId: revoke_session_api_v1_auth_sessions__session_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users:
    get:
      tags:
      - Users
      - Users
      summary: List Users
      description: List all users (admin only).
      operationId: list_users_api_v1_users_get
      security:
      - HTTPBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of users to skip
          default: 0
          title: Skip
        description: Number of users to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Number of users to return
          default: 100
          title: Limit
        description: Number of users to return
      - name: is_active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Is Active
        description: Filter by active status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Users
      - Users
      summary: Create User
      description: Create a new user (admin only).
      operationId: create_user_api_v1_users_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    get:
      tags:
      - Users
      - Users
      summary: Get User
      description: Get user details by ID.
      operationId: get_user_api_v1_users__user_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Users
      - Users
      summary: Update User
      description: Update user details.
      operationId: update_user_api_v1_users__user_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__schemas__user__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Users
      - Users
      summary: Delete User
      description: Delete a user (admin only).
      operationId: delete_user_api_v1_users__user_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/recipes:
    get:
      tags:
      - Workflows
      - Recipes
      summary: List Recipes
      description: List all recipes, optionally filtered by category.
      operationId: list_recipes_api_v1_workflows_recipes_get
      security:
      - HTTPBearer: []
      parameters:
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/RecipeCategory'
          - type: 'null'
          title: Category
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeResponse'
                title: Response List Recipes Api V1 Workflows Recipes Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Workflows
      - Recipes
      summary: Create Recipe
      description: Create a new recipe (admin only).
      operationId: create_recipe_api_v1_workflows_recipes_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/recipes/{recipe_id}:
    get:
      tags:
      - Workflows
      - Recipes
      summary: Get Recipe
      description: Get a recipe by ID including full graph data.
      operationId: get_recipe_api_v1_workflows_recipes__recipe_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          title: Recipe Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Workflows
      - Recipes
      summary: Delete Recipe
      description: Delete a recipe (admin only, cannot delete built-in recipes).
      operationId: delete_recipe_api_v1_workflows_recipes__recipe_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          title: Recipe Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/recipes/{recipe_id}/instantiate:
    post:
      tags:
      - Workflows
      - Recipes
      summary: Instantiate Recipe
      description: Create a new workflow from a recipe template.
      operationId: instantiate_recipe_api_v1_workflows_recipes__recipe_id__instantiate_post
      security:
      - HTTPBearer: []
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          title: Recipe Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeInstantiateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/{workflow_id}/publish-as-recipe:
    post:
      tags:
      - Workflows
      - Recipes
      summary: Publish As Recipe
      description: Publish an existing workflow as a recipe (admin only).
      operationId: publish_as_recipe_api_v1_workflows__workflow_id__publish_as_recipe_post
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishAsRecipeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/api-catalog:
    get:
      tags:
      - Workflows
      - Workflows
      summary: Get Api Catalog
      description: Return the Mist API endpoint catalog for action autocomplete.
      operationId: get_api_catalog_api_v1_workflows_api_catalog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/workflows/device-utils-catalog:
    get:
      tags:
      - Workflows
      - Workflows
      summary: Get Device Utils Catalog
      description: Return the device utility catalog for device_utils action autocomplete.
      operationId: get_device_utils_catalog_api_v1_workflows_device_utils_catalog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/workflows/event-pairs:
    get:
      tags:
      - Workflows
      - Workflows
      summary: Get Event Pairs
      description: Return the event pairs catalog for aggregated webhook trigger config.
      operationId: get_event_pairs_api_v1_workflows_event_pairs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/workflows:
    get:
      tags:
      - Workflows
      - Workflows
      summary: List Workflows
      description: List all workflows accessible to the current user.
      operationId: list_workflows_api_v1_workflows_get
      security:
      - HTTPBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of workflows to skip
          default: 0
          title: Skip
        description: Number of workflows to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Number of workflows to return
          default: 100
          title: Limit
        description: Number of workflows to return
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status
          title: Status Filter
        description: Filter by status
      - name: workflow_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by workflow type: standard or subflow'
          title: Workflow Type
        description: 'Filter by workflow type: standard or subflow'
      - name: tags_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated tags to filter by (AND logic)
          title: Tags Filter
        description: Comma-separated tags to filter by (AND logic)
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          description: Field to sort by
          default: name
          title: Sort By
        description: Field to sort by
      - name: sort_dir
        in: query
        required: false
        schema:
          type: string
          description: 'Sort direction: asc or desc'
          default: asc
          title: Sort Dir
        description: 'Sort direction: asc or desc'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Workflows
      - Workflows
      summary: Create Workflow
      description: Create a new graph-based workflow.
      operationId: create_workflow_api_v1_workflows_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/{workflow_id}/duplicate:
    post:
      tags:
      - Workflows
      - Workflows
      summary: Duplicate Workflow
      description: Duplicate an existing workflow.
      operationId: duplicate_workflow_api_v1_workflows__workflow_id__duplicate_post
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/executions:
    get:
      tags:
      - Workflows
      - Executions
      summary: List All Executions
      description: List all workflow executions across all workflows accessible to
        the current user.
      operationId: list_all_executions_api_v1_executions_get
      security:
      - HTTPBearer: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 25
          title: Limit
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by execution status
          title: Status Filter
        description: Filter by execution status
      - name: trigger_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by trigger type
          title: Trigger Type
        description: Filter by trigger type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/executions/{execution_id}/cancel:
    post:
      tags:
      - Workflows
      - Executions
      summary: Cancel Execution
      description: Cancel a pending or running execution.
      operationId: cancel_execution_api_v1_executions__execution_id__cancel_post
      security:
      - HTTPBearer: []
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          title: Execution Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/{workflow_id}:
    get:
      tags:
      - Workflows
      - Workflows
      summary: Get Workflow
      description: Get workflow details by ID.
      operationId: get_workflow_api_v1_workflows__workflow_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Workflows
      - Workflows
      summary: Update Workflow
      description: Update workflow details.
      operationId: update_workflow_api_v1_workflows__workflow_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Workflows
      - Workflows
      summary: Delete Workflow
      description: Delete a workflow.
      operationId: delete_workflow_api_v1_workflows__workflow_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/{workflow_id}/subflow-schema:
    get:
      tags:
      - Workflows
      - Workflows
      summary: Get Subflow Schema
      description: Get the input/output parameter schema of a sub-flow workflow.
      operationId: get_subflow_schema_api_v1_workflows__workflow_id__subflow_schema_get
      security:
      - HTTPBearer: []
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema:
          type: string
          title: Workflow Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubflowSchemaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/workflows/{workflow_id}/execute:
    post:
      tags:
      - Workflows
      - Workflows
      summary: Execute Workflow
