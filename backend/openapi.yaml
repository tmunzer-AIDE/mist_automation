        '200':
          description: Worker status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ═══════════════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    # ─────────────────────────────────────────────────────────────────────────
    # Common Schemas
    # ─────────────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Error message

    StatusMessageResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
        message:
          type: string

    # ─────────────────────────────────────────────────────────────────────────
    # Health
    # ─────────────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required:
        - status
        - app
        - version
        - environment
        - is_initialized
        - password_policy
      properties:
        status:
          type: string
          example: healthy
        app:
          type: string
          example: Mist Automation & Backup
        version:
          type: string
          example: 1.0.0
        environment:
          type: string
          example: development
        is_initialized:
          type: boolean
          description: Whether the system has been initialized (has at least one user)
        password_policy:
          type: object
          properties:
            min_length:
              type: integer
              description: Minimum password length
            require_uppercase:
              type: boolean
            require_lowercase:
              type: boolean
            require_digits:
              type: boolean
            require_special_chars:
              type: boolean

    # ─────────────────────────────────────────────────────────────────────────
    # Authentication
    # ─────────────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          minLength: 1
          description: User password
        remember_me:
          type: boolean
          default: false
          description: Keep user logged in for longer (extends token expiry)

    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          default: bearer
          description: Token type
        expires_in:
          type: integer
          description: Token expiration time in seconds

    OnboardRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Admin email address
        password:
          type: string
          format: password
          minLength: 1
          description: Admin password (must meet password policy)

    UpdateProfileRequest:
      type: object
      properties:
        timezone:
          type: string
          nullable: true
          description: User timezone (IANA format, e.g., 'America/New_York')

    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: Current password
        new_password:
          type: string
          format: password
          minLength: 1
          description: New password (must meet password policy)

    SessionResponse:
      type: object
      required:
        - id
        - user_id
        - device_info
        - trusted_device
        - created_at
        - last_activity
        - expires_at
        - is_current
      properties:
        id:
          type: string
          description: Session ID
        user_id:
          type: string
          description: User ID
        device_info:
          type: object
          additionalProperties: true
          description: Device information (browser, OS, etc.)
        trusted_device:
          type: boolean
          description: Whether this is a trusted/remembered device
        created_at:
          type: string
          format: date-time
          description: Session creation timestamp
        last_activity:
          type: string
          format: date-time
          description: Last activity timestamp
        expires_at:
          type: string
          format: date-time
          description: Session expiration timestamp
        is_current:
          type: boolean
          description: Whether this is the current session

    SessionListResponse:
      type: object
      required:
        - sessions
        - total
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        total:
          type: integer

    # ─────────────────────────────────────────────────────────────────────────
    # User
    # ─────────────────────────────────────────────────────────────────────────
    UserCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          minLength: 1
          description: User password
        roles:
          type: array
          items:
            type: string
            enum: [admin, automation, backup]
          default: []
          description: "User roles. Allowed values: admin, automation, backup"
        timezone:
          type: string
          default: UTC
          description: User timezone

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
        roles:
          type: array
          items:
            type: string
            enum: [admin, automation, backup]
          description: "User roles. Allowed values: admin, automation, backup"
        timezone:
          type: string
          description: User timezone
        is_active:
          type: boolean
          description: Whether user is active

    UserResponse:
      type: object
      required:
        - id
        - email
        - roles
        - timezone
        - is_active
        - totp_enabled
        - created_at
      properties:
        id:
          type: string
          description: User ID
        email:
          type: string
          format: email
          description: User email
        roles:
          type: array
          items:
            type: string
          description: User roles
        timezone:
          type: string
          description: User timezone
        is_active:
          type: boolean
          description: Whether user is active
        totp_enabled:
          type: boolean
          description: Whether 2FA is enabled
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        last_login:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp

    UserListResponse:
      type: object
      required:
        - users
        - total
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
          description: List of users
        total:
          type: integer
          description: Total number of users

    # ─────────────────────────────────────────────────────────────────────────
    # Workflow
    # ─────────────────────────────────────────────────────────────────────────
    ApiCatalogEntry:
      type: object
      properties:
        method:
          type: string
          description: HTTP method
        path:
          type: string
          description: API path template
        description:
          type: string
          description: Endpoint description
        category:
          type: string
          description: Category for grouping

    WorkflowCreate:
      type: object
      required:
        - name
        - trigger
        - actions
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Workflow name
        description:
          type: string
          nullable: true
          description: Workflow description
        timeout_seconds:
          type: integer
          minimum: 10
          maximum: 3600
          default: 300
          description: Workflow execution timeout
        trigger:
          type: object
          additionalProperties: true
          description: Trigger configuration
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
          minItems: 1
          description: Actions to execute

    WorkflowUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Workflow name
        description:
          type: string
          nullable: true
          description: Workflow description
        status:
          type: string
          enum: [draft, enabled, disabled]
          description: Workflow status
        timeout_seconds:
          type: integer
          minimum: 10
          maximum: 3600
          description: Workflow execution timeout
        trigger:
          type: object
          additionalProperties: true
          description: Trigger configuration
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Actions to execute

    WorkflowResponse:
      type: object
      required:
        - id
        - name
        - created_by
        - status
        - sharing
        - timeout_seconds
        - trigger
        - actions
        - execution_count
        - success_count
        - failure_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Workflow ID
        name:
          type: string
          description: Workflow name
        description:
          type: string
          nullable: true
          description: Workflow description
        created_by:
          type: string
          description: Creator user ID
        status:
          type: string
          enum: [draft, enabled, disabled]
          description: Workflow status
        sharing:
          type: string
          enum: [private, read_only, read_write]
          description: Sharing permission
        timeout_seconds:
          type: integer
          description: Execution timeout
        trigger:
          type: object
          additionalProperties: true
          description: Trigger configuration
        actions:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Actions
        execution_count:
          type: integer
          description: Total executions
        success_count:
          type: integer
          description: Successful executions
        failure_count:
          type: integer
          description: Failed executions
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    WorkflowListResponse:
      type: object
      required:
        - workflows
        - total
      properties:
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowResponse'
          description: List of workflows
        total:
          type: integer
          description: Total number of workflows

    ExecutionQueuedResponse:
      type: object
      required:
        - execution_id
        - status
        - message
      properties:
        execution_id:
          type: string
          description: Execution ID
        status:
          type: string
          example: queued
        message:
          type: string

    ExecutionResponse:
      type: object
      required:
        - id
        - workflow_id
        - workflow_name
        - status
        - trigger_type
        - started_at
      properties:
        id:
          type: string
          description: Execution ID
        workflow_id:
          type: string
          description: Workflow ID
        workflow_name:
          type: string
          description: Workflow name
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
          description: Execution status
        trigger_type:
          type: string
          description: How execution was triggered
        started_at:
          type: string
          format: date-time
          description: Start timestamp
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Completion timestamp
        duration_ms:
          type: integer
          nullable: true
          description: Duration in milliseconds
        actions_executed:
          type: integer
          description: Number of actions executed
        actions_succeeded:
          type: integer
          description: Number of actions succeeded
        actions_failed:
          type: integer
          description: Number of actions failed

    ExecutionListResponse:
      type: object
      required:
        - executions
        - total
      properties:
        executions:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionResponse'
          description: List of executions
        total:
          type: integer
          description: Total number of executions

    ExecutionDetailResponse:
      type: object
      required:
        - id
        - workflow_id
        - workflow_name
        - status
        - trigger_type
        - started_at
      properties:
        id:
          type: string
          description: Execution ID
        workflow_id:
          type: string
          description: Workflow ID
        workflow_name:
          type: string
          description: Workflow name
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
          description: Execution status
        trigger_type:
          type: string
          description: How execution was triggered
        trigger_data:
          type: object
          additionalProperties: true
          nullable: true
          description: Trigger data (e.g., webhook payload)
        triggered_by:
          type: string
          nullable: true
          description: User ID who triggered (for manual)
        started_at:
          type: string
          format: date-time
          description: Start timestamp
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Completion timestamp
        duration_ms:
          type: integer
          nullable: true
          description: Duration in milliseconds
        trigger_condition_passed:
          type: boolean
          nullable: true
          description: Whether trigger condition was met
        trigger_condition:
          type: string
          nullable: true
          description: Trigger condition expression
        actions_executed:
          type: integer
          description: Number of actions executed
        actions_succeeded:
          type: integer
          description: Number of actions succeeded
        actions_failed:
          type: integer
          description: Number of actions failed
        action_results:
          type: array
          items:
            type: object
            properties:
              action_name:
                type: string
              status:
                type: string
              started_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
                nullable: true
              duration_ms:
                type: integer
                nullable: true
              error:
                type: string
                nullable: true
              output:
                type: object
                additionalProperties: true
                nullable: true
              retry_count:
                type: integer
          description: Results of each action
        error:
          type: string
          nullable: true
          description: Error message if failed
        error_details:
          type: object
          additionalProperties: true
          nullable: true
          description: Detailed error information
        variables:
          type: object
          additionalProperties: true
          description: Variables available during execution
        logs:
          type: array
          items:
            type: string
          description: Execution logs

    # ─────────────────────────────────────────────────────────────────────────
    # Webhook
    # ─────────────────────────────────────────────────────────────────────────
    WebhookReceivedResponse:
      type: object
      required:
        - status
        - event_id
        - routed_to
        - message
      properties:
        status:
          type: string
          example: received
        event_id:
          type: string
          description: Stored event ID
        routed_to:
          type: array
          items:
            type: string
          description: Modules the webhook was routed to
        message:
          type: string
        backup_result:
          type: object
          additionalProperties: true
          nullable: true
          description: Result from backup module if applicable

    WebhookEventResponse:
      type: object
      required:
        - id
        - webhook_type
        - webhook_id
        - processed
        - signature_valid
        - received_at
      properties:
        id:
          type: string
          description: Event ID
        webhook_type:
          type: string
          description: Webhook type
        webhook_topic:
          type: string
          nullable: true
          description: Webhook topic
        webhook_id:
          type: string
          description: Unique webhook ID
        source_ip:
          type: string
          nullable: true
          description: Source IP address
        site_id:
          type: string
          nullable: true
          description: Mist site ID
        org_id:
          type: string
          nullable: true
          description: Mist organization ID
        processed:
          type: boolean
          description: Whether processed
        matched_workflows:
          type: array
          items:
            type: string
          description: Matched workflow IDs
        executions_triggered:
          type: array
          items:
            type: string
          description: Triggered execution IDs
        signature_valid:
          type: boolean
          description: Signature validity
        routed_to:
          type: array
          items:
            type: string
          description: Modules routed to
        response_status:
          type: integer
          description: HTTP status code returned
        response_body:
          type: object
          additionalProperties: true
          description: Response body returned
        received_at:
          type: string
          format: date-time
          description: Receipt timestamp
        processed_at:
          type: string
          format: date-time
          nullable: true
          description: Processing timestamp

    WebhookEventDetailResponse:
      allOf:
        - $ref: '#/components/schemas/WebhookEventResponse'
        - type: object
          required:
            - payload
          properties:
            payload:
              type: object
              additionalProperties: true
              description: Webhook payload
            headers:
              type: object
              additionalProperties:
                type: string
              description: HTTP headers

    WebhookListResponse:
      type: object
      required:
        - events
        - total
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventResponse'
          description: List of webhook events
        total:
          type: integer
          description: Total number of events

    # ─────────────────────────────────────────────────────────────────────────
    # Backup
    # ─────────────────────────────────────────────────────────────────────────
    BackupCreateRequest:
      type: object
      properties:
        backup_type:
          type: string
          enum: [full, manual]
          default: full
          description: Backup type
        site_id:
          type: string
          nullable: true
          description: Site ID (for site-scoped manual backup)
        object_type:
          type: string
          nullable: true
          description: Object type in 'org:key' or 'site:key' format (for manual backup)
        object_ids:
          type: array
          items:
            type: string
          nullable: true
          description: Object IDs to backup (for manual list-type backup)

    BackupJobResponse:
      type: object
      required:
        - id
        - backup_type
        - org_id
        - status
        - object_count
        - size_bytes
        - created_at
      properties:
        id:
          type: string
          description: Backup ID
        backup_type:
          type: string
          enum: [manual, full]
          description: Backup type
        org_id:
          type: string
          description: Organization ID
        org_name:
          type: string
          nullable: true
          description: Organization name
        site_id:
          type: string
          nullable: true
          description: Site ID
        site_name:
          type: string
          nullable: true
          description: Site name
        status:
          type: string
          enum: [pending, running, completed, failed]
          description: Backup status
        object_count:
          type: integer
          description: Number of backed up objects
        size_bytes:
          type: integer
          description: Backup size in bytes
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        created_by:
          type: string
          nullable: true
          description: Creator user ID
        webhook_event:
          type: array
          items:
            type: object
            additionalProperties: true
          nullable: true
          description: Associated webhook events (for incremental backups)
        error:
          type: string
          nullable: true
          description: Error message if failed

    BackupJobListResponse:
      type: object
      required:
        - backups
        - total
      properties:
        backups:
          type: array
          items:
            $ref: '#/components/schemas/BackupJobResponse'
          description: List of backups
        total:
          type: integer
          description: Total number of backups

    BackupDiffResponse:
      type: object
      required:
        - backup_id_1
        - backup_id_2
        - differences
        - added_count
        - removed_count
        - modified_count
      properties:
        backup_id_1:
          type: string
          description: First backup ID
        backup_id_2:
          type: string
          description: Second backup ID
        differences:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: Path to the changed field
              type:
                type: string
                enum: [added, removed, modified]
                description: Type of change
              value:
                description: Value (for added/removed)
              old:
                description: Old value (for modified)
              new:
                description: New value (for modified)
          description: List of differences
        added_count:
          type: integer
          description: Number of added items
        removed_count:
          type: integer
          description: Number of removed items
        modified_count:
          type: integer
          description: Number of modified items

    BackupTimelineResponse:
      type: object
      required:
        - org_id
        - backups
        - total
      properties:
        org_id:
          type: string
          description: Organization ID
        site_id:
          type: string
          nullable: true
          description: Site ID
        backups:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              backup_type:
                type: string
              status:
                type: string
              object_count:
                type: integer
              created_at:
                type: string
                format: date-time
              created_by:
                type: string
                nullable: true
          description: Timeline of backups
        total:
          type: integer
          description: Total number of backups

    BackupObjectSummary:
      type: object
      required:
        - object_id
        - object_type
        - org_id
        - scope
        - version_count
        - latest_version
        - first_backed_up_at
        - last_backed_up_at
        - is_deleted
        - event_type
      properties:
        object_id:
          type: string
          description: Object ID
        object_type:
          type: string
          description: Object type
        object_name:
          type: string
          nullable: true
          description: Object name
        org_id:
          type: string
          description: Organization ID
        site_id:
          type: string
          nullable: true
          description: Site ID
        site_name:
          type: string
          nullable: true
          description: Site name
        scope:
          type: string
          enum: [org, site]
          description: Object scope
        version_count:
          type: integer
          description: Number of versions
        latest_version:
          type: integer
          description: Latest version number
        first_backed_up_at:
          type: string
          format: date-time
          description: First backup timestamp
        last_backed_up_at:
          type: string
          format: date-time
          description: Last backup timestamp
        last_modified_at:
          type: string
          format: date-time
          nullable: true
          description: Last modification timestamp
        is_deleted:
          type: boolean
          description: Whether object is deleted
        event_type:
          type: string
          description: Last event type

    BackupObjectListResponse:
      type: object
      required:
        - objects
        - total
      properties:
        objects:
          type: array
          items:
            $ref: '#/components/schemas/BackupObjectSummary'
        total:
          type: integer

    BackupChangeEvent:
      type: object
      required:
        - id
        - object_id
        - object_type
        - scope
        - event_type
        - version
        - changed_fields
        - backed_up_at
      properties:
        id:
          type: string
          description: Change event ID
        object_id:
          type: string
          description: Object ID
        object_type:
          type: string
          description: Object type
        object_name:
          type: string
          nullable: true
          description: Object name
        site_id:
          type: string
          nullable: true
          description: Site ID
        site_name:
          type: string
          nullable: true
          description: Site name
        scope:
          type: string
          enum: [org, site]
          description: Object scope
        event_type:
          type: string
          description: Event type (full_backup, updated, deleted, restored, etc.)
        version:
          type: integer
          description: Version number
        changed_fields:
          type: array
          items:
            type: string
          description: List of changed field paths
        backed_up_at:
          type: string
          format: date-time
          description: Backup timestamp
        backed_up_by:
          type: string
          nullable: true
          description: User who triggered backup

    BackupChangeListResponse:
      type: object
      required:
        - changes
        - total
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/BackupChangeEvent'
        total:
          type: integer

    BackupObjectVersionResponse:
      type: object
      required:
        - id
        - object_id
        - object_type
        - org_id
        - version
        - event_type
        - changed_fields
        - backed_up_at
        - is_deleted
        - configuration
      properties:
        id:
          type: string
          description: Version document ID
        object_id:
          type: string
          description: Object ID
        object_type:
          type: string
          description: Object type
        object_name:
          type: string
          nullable: true
          description: Object name
        org_id:
          type: string
          description: Organization ID
        site_id:
          type: string
